<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>✨ Loire Ride Zen – Carte de voyage à vélo 🚲</title>
    <meta
      name="description"
      content="Découvrez la carte interactive de Loire Ride Zen 🚴‍♂️ : étapes de ma rando à vélo, châteaux de la Loire et coups de cœur en chemin."
    />

    <!-- Runtime config (généré au build Vercel depuis les env vars, ou config.js local) -->
    <script src="config.js"></script>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.css"
    />
    <script type="importmap">
      {
        "imports": {
          "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js",
          "leaflet-extra-markers": "https://unpkg.com/leaflet-extra-markers@2.0.1/src/index.js"
        }
      }
    </script>

    <!-- Privacy-friendly analytics by Plausible -->
    <script
      async
      src="https://plausible.io/js/pa-BOQLtEKyALECqC2DirH6B.js"
    ></script>
    <script>
      ((window.plausible =
        window.plausible ||
        function () {
          (plausible.q = plausible.q || []).push(arguments);
        }),
        (plausible.init =
          plausible.init ||
          function (i) {
            plausible.o = i || {};
          }));
      plausible.init();
    </script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      .extra-marker-content {
        z-index: 1000;
      }
      h1 {
        font-size: 1.25rem;
        text-align: center;
        margin: 5px 0 0;
      }
      #map {
        height: 100%;
      }
      .controls {
        position: absolute;
        z-index: 1000;
        top: 10px;
        background: white;
        padding: 0.6rem 0.8rem;
        border-radius: 0.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        font-family: system-ui, sans-serif;
        transition: transform 0.25s ease;
        max-width: 320px;
      }
      #toggleFilters {
        position: absolute;
        z-index: 1100;
        top: 10px;
        left: 10px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 0.5rem;
        padding: 0.4rem 0.6rem;
        font-family: system-ui, sans-serif;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      #toggleFilters[aria-expanded="true"] {
        background: #f5f5f5;
      }
      #filtersPanel img.logo {
        max-width: 120px;
        height: auto;
        border-radius: 8px;
        display: block;
        margin: 0 auto 0.5rem auto;
      }
      .controls hr {
        margin: 0.5rem 0;
      }
      .poi-popup img {
        max-width: 100%;
        display: block;
        border-radius: 2px;
        margin-bottom: 0.35rem;
      }
      @media (min-width: 900px) {
        #toggleFilters {
          display: none;
        }
        .controls {
          left: 10px;
          top: 10px;
        }
      }
      @media (max-width: 899px) {
        .controls {
          left: 0;
          top: 0;
          width: min(90vw, 420px);
          height: 100%;
          overflow: auto;
          transform: translateX(-100%);
          box-shadow: 0 0 0 rgba(0, 0, 0, 0);
          border-right: 1px solid #eee;
        }
        .controls.open {
          transform: translateX(0);
          box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
        }
      }
      .lrz-error-banner {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fef3c7;
        border: 1px solid #d97706;
        color: #78350f;
        padding: 8px 12px;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        font-size: 14px;
        font-family: inherit;
        max-width: 380px;
      }
      .lrz-error-banner__retry {
        background: #d97706;
        color: white;
        border: 0;
        border-radius: 3px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 13px;
      }
      .lrz-error-banner__retry:hover {
        background: #b45309;
      }
    </style>
  </head>
  <body>
    <!-- Filtres + légende -->
    <div
      id="filtersPanel"
      class="controls"
      role="region"
      aria-label="Filtres carte"
    >
      <div style="text-align: center; margin-bottom: 0.5rem">
        <img
          src="/assets/logo_loire_ride_zen.jpg"
          class="logo"
          alt="Logo Loire Ride Zen"
          style="max-width: 120px; height: auto; border-radius: 8px"
        />
      </div>
      <strong>Filtres</strong>
      <div
        style="
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 0.25rem 0.75rem;
          margin-top: 0.35rem;
        "
      >
        <label
          ><input
            type="checkbox"
            class="type-filter"
            value="patrimoine"
            checked
          />
          Patrimoine</label
        >
        <label
          ><input
            type="checkbox"
            class="type-filter"
            value="guinguette"
            checked
          />
          Guinguette</label
        >
        <label
          ><input
            type="checkbox"
            class="type-filter"
            value="hébergement"
            checked
          />
          Hébergement</label
        >
        <label
          ><input
            type="checkbox"
            class="type-filter"
            value="coupdecoeur"
            checked
          />
          Coup de cœur</label
        >
        <label
          ><input type="checkbox" class="type-filter" value="départ" checked />
          Départ</label
        >
        <label
          ><input type="checkbox" class="type-filter" value="arrivée" checked />
          Arrivée</label
        >
        <label
          ><input type="checkbox" class="type-filter" value="photo" checked />
          Photos</label
        >
      </div>
      <hr />
      <div class="legend-in-controls">
        <div style="margin-bottom: 0.25rem; font-weight: 600">Légende</div>
        <div
          style="
            display: grid;
            grid-template-columns: auto 1fr;
            grid-row-gap: 0.3rem;
            grid-column-gap: 0.5rem;
            align-items: center;
          "
        >
          <div style="width: 16px; height: 4px; background: #2e86ab"></div>
          <div>Trace principale</div>
          <div style="width: 16px; height: 4px; background: #8e44ad"></div>
          <div>Variante / détour</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #3498db;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            🏰
          </div>
          <div>Patrimoine</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #f39c12;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            🍻
          </div>
          <div>Guinguette</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #9b59b6;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            🏕️
          </div>
          <div>Hébergement</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #00bcd4;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            📸
          </div>
          <div>Photo</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #f1c40f;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            💖
          </div>
          <div>Coup de cœur</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #2ecc71;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            🏳️
          </div>
          <div>Départ</div>
          <div
            style="
              width: 25px;
              height: 25px;
              border-radius: 50%;
              background: #fff;
              border: 2px solid #e74c3c;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            🏁
          </div>
          <div>Arrivée</div>
        </div>
      </div>
    </div>

    <button
      id="toggleFilters"
      aria-expanded="false"
      aria-controls="filtersPanel"
    >
      Filtres
    </button>
    <div id="map"></div>

    <script type="module">
      import {
        Map,
        TileLayer,
        GeoJSON,
        Marker,
        LayerGroup,
        Control,
        DomUtil,
        DomEvent,
      } from "leaflet";

      import * as leafletExtraMarkers from "leaflet-extra-markers";

      const {
        Icon,
        TackSquareBorder,
        TackCircleBorder,
        TackStarBorder,
        TackDiamondBorder,
      } = leafletExtraMarkers;

      // 🔑 Supabase config — valeurs injectées via window.LRZ_CONFIG (config.js)
      const cfg = window.LRZ_CONFIG || {};
      const SUPA_URL = cfg.SUPA_URL;
      const SUPA_PUBLISHABLE_KEY = cfg.SUPA_PUBLISHABLE_KEY;

      if (!SUPA_URL || !SUPA_PUBLISHABLE_KEY) {
        console.error(
          "[loireridezen] config.js manquant ou incomplet. " +
            "Créer config.js depuis config.js.example pour dev local.",
        );
      }

      // 1) Carte + fonds
      const map = new Map("map", {
        zoomControl: true,
        scrollWheelZoom: true,
      }).setView([47.3, 0.5], 8);

      const baseOSM = new TileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution: "&copy; OpenStreetMap",
        },
      );

      const baseEsriSat = new TileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { attribution: "Imagery © Esri & sources" },
      );

      // Pane et labels
      map.createPane("labelsPane");
      map.getPane("labelsPane").style.pointerEvents = "none";
      map.getPane("labelsPane").style.zIndex = 650;
      const esriLabels = new TileLayer(
        "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
        { pane: "labelsPane", attribution: "Labels © Esri" },
      );

      // Charger préférence de fond
      const savedBase = localStorage.getItem("baseLayer");
      if (savedBase === "sat") {
        baseEsriSat.addTo(map);
        esriLabels.addTo(map);
      } else {
        baseOSM.addTo(map);
      }

      // 2) Trace
      const colors = [
        "#2E86AB",
        "#1F77B4",
        "#5DADE2",
        "#9B59B6",
        "#E74C3C",
        "#F39C12",
        "#27AE60",
        "#16A085",
        "#34495E",
      ];
      const routeLayer = new GeoJSON(null, {
        style: (f) => {
          const s = f.properties?.stage || 0;
          return { color: colors[s % colors.length], weight: 4, opacity: 0.9 };
        },
      });
      // 👉 Nouvelle trace : Boucle Angevine
      const boucleLayer = new GeoJSON(null, {
        style: () => ({
          color: "#FF7F00", // orange chaud (différent de la trace principale)
          weight: 4,
          opacity: 0.9,
          dashArray: "6,4", // tirets pour différencier visuellement
        }),
      });
      fetch("data/route_simplified.geojson")
        .then((r) =>
          r.ok ? r.json() : fetch("data/route.geojson").then((rr) => rr.json()),
        )
        .then((gj) => {
          routeLayer.addData(gj).addTo(map);
          try {
            map.fitBounds(routeLayer.getBounds(), {
              padding: [30, 30],
              maxZoom: 13,
            });
          } catch (e) {
            console.warn("[loireridezen] fitBounds failed:", e);
          }
        });

      // Charger la Boucle Angevine
      fetch("data/boucle_angevine.geojson")
        .then((r) => r.json())
        .then((gj) => {
          boucleLayer.addData(gj);
          // (Optionnel) bouton pour zoomer sur la boucle — voir plus bas
        })
        .catch(() => console.warn("Boucle Angevine introuvable"));

      // 3) Markers layer
      const cluster = new LayerGroup();
      cluster.addTo(map);

      // Bannière d'erreur Supabase (masquée par défaut)
      const errorControl = new Control({ position: "bottomleft" });
      let currentRetry = null;

      errorControl.onAdd = function () {
        const div = DomUtil.create("div", "lrz-error-banner");
        div.setAttribute("role", "status");
        div.setAttribute("aria-live", "polite");
        div.style.display = "none";
        div.innerHTML = `
          <span class="lrz-error-banner__msg">Impossible de charger les lieux.</span>
          <button type="button" class="lrz-error-banner__retry">Réessayer</button>
        `;
        DomEvent.disableClickPropagation(div);
        div
          .querySelector(".lrz-error-banner__retry")
          .addEventListener("click", () => {
            if (currentRetry) currentRetry();
          });
        return div;
      };
      errorControl.addTo(map);

      function showErrorBanner(onRetry) {
        currentRetry = onRetry;
        errorControl.getContainer().style.display = "flex";
      }
      function hideErrorBanner() {
        currentRetry = null;
        errorControl.getContainer().style.display = "none";
      }

      // 4) Icônes
      const iconByType = (type) => {
        switch (type) {
          case "patrimoine":
            return new Icon({
              content: "🏰",
              color: "#2196F3",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackStarBorder,
            });
          case "départ":
            return new Icon({
              content: "🏳️",
              color: "#4CAF50",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackDiamondBorder,
            });
          case "arrivée":
            return new Icon({
              content: "🏁",
              color: "#F44336",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackDiamondBorder,
            });
          case "guinguette":
            return new Icon({
              content: "🍻",
              color: "#FF9800",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackSquareBorder,
            });
          case "hébergement":
            return new Icon({
              content: "🏕️",
              color: "#9C27B0",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackSquareBorder,
            });
          case "photo":
            return new Icon({
              content: "📸",
              color: "#32a9dd",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackSquareBorder,
            });
          case "coupdecoeur":
            return new Icon({
              content: "💖",
              color: "#FFC107",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackSquareBorder,
            });
          default:
            return new Icon({
              content: "📍",
              color: "#00BCD4",
              accentColor: "rgba(0,0,0,0.25)",
              svg: TackCircleBorder,
            });
        }
      };

      // Utils — échappement HTML et validation d'URL
      function escapeHtml(str) {
        if (str === null || str === undefined) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function safeHttpUrl(url) {
        if (!url) return null;
        const trimmed = String(url).trim();
        if (!/^https?:\/\//i.test(trimmed)) return null;
        return trimmed;
      }

      // 5) Fetch BDD
      let lastAbort = null;
      const debounce = (fn, ms = 250) => {
        let t;
        return (...a) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...a), ms);
        };
      };

      async function fetchPoisFromSupabase(
        bounds,
        activeType = null,
        activeStage = null,
        signal,
      ) {
        const qs = new URLSearchParams({
          minlon: bounds.getWest(),
          minlat: bounds.getSouth(),
          maxlon: bounds.getEast(),
          maxlat: bounds.getNorth(),
        });
        if (activeType) qs.set("p_type", activeType);
        if (activeStage != null) qs.set("p_stage", String(activeStage));

        const res = await fetch(
          `${SUPA_URL}/rest/v1/rpc/pois_bbox_geojson?${qs}`,
          {
            headers: {
              apikey: SUPA_PUBLISHABLE_KEY,
              Authorization: `Bearer ${SUPA_PUBLISHABLE_KEY}`,
            },
            signal,
          },
        );
        if (!res.ok) throw new Error(`Supabase ${res.status}`);
        return res.json();
      }

      async function fetchLocalPhotos() {
        try {
          const r = await fetch("data/pois_photos.geojson");
          if (!r.ok) return { type: "FeatureCollection", features: [] };
          return r.json();
        } catch (e) {
          return { type: "FeatureCollection", features: [] };
        }
      }

      function bindPopupFromProps(p, layer) {
        const img = p.thumb || p.image;
        const insta = safeHttpUrl(p.url_insta);
        layer.bindPopup(`
          <div class="poi-popup">
            ${img ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(p.name || "POI")}"/>` : ""}
            <strong>${escapeHtml(p.name || "Point")}</strong><br/>
            <small>${escapeHtml(p.type || "")}${
              p.stage ? ` · Étape ${escapeHtml(String(p.stage))}` : ""
            }</small>
            <p>${escapeHtml(p.description || "")}</p>
            ${insta ? `<p><a href="${escapeHtml(insta)}" target="_blank" rel="noopener noreferrer">Voir sur Instagram 📲</a></p>` : ""}
          </div>
        `);
      }

      async function loadPoisForViewport() {
        const activeTypes = Array.from(
          document.querySelectorAll(".type-filter:checked"),
        ).map((i) => i.value);
        const activeType = activeTypes.length === 1 ? activeTypes[0] : null;

        if (lastAbort) lastAbort.abort();
        const controller = new AbortController();
        lastAbort = controller;

        const bounds = map.getBounds();

        try {
          const [fcDB, fcLocal] = await Promise.all([
            fetchPoisFromSupabase(bounds, activeType, null, controller.signal),
            fetchLocalPhotos(),
          ]);
          const all = (fcDB.features || []).concat(fcLocal.features || []);
          const activeSet = new Set(activeTypes);
          const filtered = all.filter((f) =>
            activeSet.has((f.properties || {}).type),
          );

          cluster.clearLayers();
          const layer = new GeoJSON(
            { type: "FeatureCollection", features: filtered },
            {
              pointToLayer: (f, latlng) =>
                new Marker(latlng, {
                  icon: iconByType((f.properties || {}).type),
                }),
              onEachFeature: (f, l) =>
                bindPopupFromProps(f.properties || {}, l),
            },
          );
          cluster.addLayer(layer);
          hideErrorBanner();
        } catch (e) {
          if (e.name === "AbortError") return;
          console.error("[loireridezen] fetchPoisFromSupabase failed", {
            bbox: {
              west: bounds.getWest(),
              south: bounds.getSouth(),
              east: bounds.getEast(),
              north: bounds.getNorth(),
            },
            error: e.message,
            stack: e.stack,
          });
          showErrorBanner(loadPoisForViewport);
        }
      }

      const loadPoisDebounced = debounce(loadPoisForViewport, 250);
      map.on("moveend", loadPoisDebounced);
      document
        .querySelectorAll(".type-filter")
        .forEach((cb) => cb.addEventListener("change", loadPoisDebounced));
      loadPoisForViewport();

      // 6) Drawer mobile
      const toggleBtn = document.getElementById("toggleFilters");
      const panel = document.getElementById("filtersPanel");
      function setOpen(o) {
        if (o) {
          panel.classList.add("open");
          toggleBtn.setAttribute("aria-expanded", "true");
        } else {
          panel.classList.remove("open");
          toggleBtn.setAttribute("aria-expanded", "false");
        }
      }
      toggleBtn.addEventListener("click", () =>
        setOpen(!panel.classList.contains("open")),
      );
      map.on("click", () => {
        if (window.matchMedia("(max-width:899px)").matches) setOpen(false);
      });

      // 7) Contrôle des couches (fond + overlays)
      const baseMaps = {
        "Plan (OSM)": baseOSM,
        "Satellite (Esri)": baseEsriSat,
      };
      const overlays = {
        "Trace principale": routeLayer,
        "Boucle Angevine": boucleLayer, // ← nouvelle ligne
        "Points d’intérêt": cluster,
      };
      new Control.Layers(baseMaps, overlays, { collapsed: false }).addTo(map);

      map.on("baselayerchange", (e) => {
        if (e.name.includes("Satellite")) {
          esriLabels.addTo(map);
          localStorage.setItem("baseLayer", "sat");
        } else {
          map.removeLayer(esriLabels);
          localStorage.setItem("baseLayer", "osm");
        }
      });
    </script>
  </body>
</html>
