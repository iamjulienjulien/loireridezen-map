<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loire Ride Zen – Carte</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- ExtraMarkers + Font Awesome -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-extra-markers@1.2.1/dist/css/leaflet.extra-markers.min.css">
  <script src="https://unpkg.com/leaflet-extra-markers@1.2.1/dist/js/leaflet.extra-markers.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Fullscreen plugin -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@1.6.0/Control.FullScreen.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@1.6.0/Control.FullScreen.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; }

    .controls {
      position: absolute; z-index: 1000; top: 10px;
      background: white; padding: .6rem .8rem; border-radius: .5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); font-family: system-ui, sans-serif;
      transition: transform .25s ease;
      max-width: 320px;
    }
    #toggleFilters {
      position: absolute; z-index: 1100; top: 10px; left: 10px;
      background: #fff; border: 1px solid #ddd; border-radius: .5rem;
      padding: .4rem .6rem; font-family: system-ui, sans-serif; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    #toggleFilters[aria-expanded="true"] { background:#f5f5f5; }

    .controls hr { margin: .5rem 0; }
    .poi-popup img { max-width: 240px; display: block; border-radius: 8px; margin-bottom: .35rem; }

    @media (min-width: 900px) {
      #toggleFilters { display: none; }
      .controls { left: 60px; top: 10px; }
    }
    @media (max-width: 899px) {
      .controls {
        left: 0; top: 0;
        width: min(90vw, 420px); height: 100%;
        overflow:auto; transform: translateX(-100%);
        box-shadow: 0 0 0 rgba(0,0,0,0); border-right: 1px solid #eee;
      }
      .controls.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.15); }
    }
  </style>
</head>
<body>

  <!-- Panneau filtres + légende -->
  <div id="filtersPanel" class="controls" role="region" aria-label="Filtres carte">
    <strong>Filtres :</strong>
    <div style="display:grid;grid-template-columns: 1fr 1fr; gap:.25rem .75rem; margin-top:.35rem;">
      <label><input type="checkbox" class="type-filter" value="paysage" checked> Paysage</label>
      <label><input type="checkbox" class="type-filter" value="patrimoine" checked> Patrimoine</label>
      <label><input type="checkbox" class="type-filter" value="guinguette" checked> Guinguette</label>
      <label><input type="checkbox" class="type-filter" value="hébergement" checked> Hébergement</label>
      <label><input type="checkbox" class="type-filter" value="départ" checked> Départ</label>
      <label><input type="checkbox" class="type-filter" value="arrivée" checked> Arrivée</label>
      <label><input type="checkbox" class="type-filter" value="photo" checked> Photos</label>
      <label><input type="checkbox" class="type-filter" value="coupdecoeur" checked> Coup de cœur</label>
    </div>
    <hr>
    <div class="legend-in-controls">
      <div style="font-weight:600; margin-bottom:.25rem;">Légende</div>
      <div style="display:grid;grid-template-columns: auto 1fr;grid-row-gap:.3rem;grid-column-gap:.5rem;align-items:center;">
        <div style="width:16px;height:4px;background:#2E86AB;"></div><div>Trace principale</div>
        <div style="width:16px;height:4px;background:#8E44AD;"></div><div>Variante / détour</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#3498db;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-landmark" style="font-size:10px;color:#fff;"></i></div><div>Patrimoine</div>
        <div style="width:16px;height:16px;border-radius:4px;background:#2ecc71;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-flag-checkered" style="font-size:10px;color:#fff;"></i></div><div>Départ</div>
        <div style="width:16px;height:16px;border-radius:4px;background:#e74c3c;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-bullseye" style="font-size:10px;color:#fff;"></i></div><div>Arrivée</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#f39c12;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-music" style="font-size:10px;color:#fff;"></i></div><div>Guinguette</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#9b59b6;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-campground" style="font-size:10px;color:#fff;"></i></div><div>Hébergement</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#00bcd4;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-camera" style="font-size:10px;color:#fff;"></i></div><div>Photo</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#f1c40f;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-star" style="font-size:10px;color:#fff;"></i></div><div>Coup de cœur</div>
      </div>
    </div>
  </div>

  <!-- Bouton pour mobile -->
  <button id="toggleFilters" aria-expanded="false" aria-controls="filtersPanel">Filtres</button>

  <!-- Carte -->
  <div id="map"></div>

  <script>
    // 🔑 Supabase config
    const SUPA_URL = "https://covxsekavbmeqysdqnjh.supabase.co";
    const SUPA_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvdnhzZWthdmJtZXF5c2RxbmpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY4NDI0MDAsImV4cCI6MjA3MjQxODQwMH0.Z53SrJ7_T4VrF8L0Ou476odsTo9ZqPrKFQXi4jRbWCU"; // clé publique OK côté client pour lecture

    // 1) Carte de base
    const map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([47.3, 0.5], 8);
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
    map.addControl(new L.Control.FullScreen({ position: 'topright', title: 'Plein écran' }));

    // 2) Trace par étapes (locale)
    const colors = ['#2E86AB','#1F77B4','#5DADE2','#9B59B6','#E74C3C','#F39C12','#27AE60','#16A085','#34495E'];
    const routeLayer = L.geoJSON(null, {
      style: f => {
        const stage = f.properties?.stage || 0;
        return { color: colors[stage % colors.length], weight: 4, opacity: 0.9 };
      }
    });
    fetch('data/route_simplified.geojson')
      .then(r => r.ok ? r.json() : fetch('data/route.geojson').then(rr => rr.json()))
      .then(gj => { routeLayer.addData(gj).addTo(map); try { map.fitBounds(routeLayer.getBounds(), { padding:[30,30], maxZoom: 13 }); } catch(e) {} });

    // 3) Clustering
    const cluster = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 40,
      disableClusteringAtZoom: 15
    });
    L.control.layers({ "OpenStreetMap": osm }, { "Trace": routeLayer, "Points d’intérêt": cluster }).addTo(map);

    // 4) Icônes POI
    const iconByType = (type) => {
      switch (type) {
        case 'patrimoine': return L.ExtraMarkers.icon({ icon: 'landmark', prefix: 'fa', markerColor: 'blue', shape: 'penta' });
        case 'départ': return L.ExtraMarkers.icon({ icon: 'flag-checkered', prefix: 'fa', markerColor: 'green', shape: 'square' });
        case 'arrivée': return L.ExtraMarkers.icon({ icon: 'bullseye', prefix: 'fa', markerColor: 'red', shape: 'square' });
        case 'guinguette': return L.ExtraMarkers.icon({ icon: 'music', prefix: 'fa', markerColor: 'orange', shape: 'circle' });
        case 'hébergement': return L.ExtraMarkers.icon({ icon: 'campground', prefix: 'fa', markerColor: 'purple', shape: 'circle' });
        case 'photo': return L.ExtraMarkers.icon({ icon: 'camera', prefix: 'fa', markerColor: 'cyan', shape: 'circle' });
        case 'coupdecoeur': return L.ExtraMarkers.icon({ icon: 'star', prefix: 'fa', markerColor: 'yellow', shape: 'circle' });
        default: return L.ExtraMarkers.icon({ icon: 'map-pin', prefix: 'fa', markerColor: 'cyan', shape: 'circle' });
      }
    };

    // 5) Chargement POI depuis Supabase (RPC GeoJSON par BBOX)
    let lastAbort = null;
    function debounce(fn, ms=250){ let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); }; }

    async function fetchPoisFromSupabase(bounds, activeType=null, activeStage=null, signal) {
      const params = new URLSearchParams({
        minlon: bounds.getWest(),
        minlat: bounds.getSouth(),
        maxlon: bounds.getEast(),
        maxlat: bounds.getNorth()
      });
      if (activeType) params.set('p_type', activeType);
      if (activeStage != null) params.set('p_stage', String(activeStage));

      const url = `${SUPA_URL}/rest/v1/rpc/pois_bbox_geojson?${params.toString()}`;
      const res = await fetch(url, {
        headers: { apikey: SUPA_ANON_KEY, Authorization: `Bearer ${SUPA_ANON_KEY}` },
        signal
      });
      if (!res.ok) throw new Error(`Supabase ${res.status}`);
      return res.json(); // FeatureCollection
    }

    function bindPopupFromProps(p, layer){
      const img = p.thumb || p.image;
      const insta = p.url_insta ? `<p><a href="${p.url_insta}" target="_blank" rel="noopener">Voir sur Instagram 📲</a></p>` : '';
      layer.bindPopup(`
        <div class="poi-popup">
          ${img ? `<img src="${img}" alt="${p.name||'POI'}" />` : ''}
          <strong>${p.name||'Point'}</strong><br/>
          <small>${p.type||''}${p.stage ? ` · Étape ${p.stage}` : ''}</small>
          <p>${p.description || ''}</p>
          ${insta}
        </div>
      `);
    }

    async function loadPoisForViewport() {
      // Filtre type simple : si un seul type coché, on applique côté SQL; sinon null
      const activeTypes = Array.from(document.querySelectorAll('.type-filter:checked')).map(i => i.value);
      const activeType = activeTypes.length === 1 ? activeTypes[0] : null;

      // Annule la requête précédente si encore en vol
      if (lastAbort) lastAbort.abort();
      const controller = new AbortController();
      lastAbort = controller;

      try {
        const fc = await fetchPoisFromSupabase(map.getBounds(), activeType, null, controller.signal);
        console.log(fc);
        cluster.clearLayers();
        const layer = L.geoJSON(fc, {
          pointToLayer: (f, latlng) => L.marker(latlng, { icon: iconByType(f.properties?.type) }),
          onEachFeature: (f, l) => bindPopupFromProps(f.properties||{}, l)
        });
        console.log(layer);
        cluster.addLayer(layer);
      } catch(e) {
        if (e.name !== 'AbortError') console.error('Erreur chargement POI:', e);
      }
    }

    const loadPoisDebounced = debounce(loadPoisForViewport, 250);
    map.on('moveend', loadPoisDebounced);
    document.querySelectorAll('.type-filter').forEach(cb => cb.addEventListener('change', loadPoisDebounced));
    loadPoisForViewport(); // premier chargement

    // 6) Drawer mobile
    const toggleBtn=document.getElementById('toggleFilters'); const panel=document.getElementById('filtersPanel');
    function setOpen(o){ if(o){panel.classList.add('open');toggleBtn.setAttribute('aria-expanded','true');}else{panel.classList.remove('open');toggleBtn.setAttribute('aria-expanded','false');}}
    toggleBtn.addEventListener('click',()=>setOpen(!panel.classList.contains('open')));
    map.on('click',()=>{if(window.matchMedia('(max-width:899px)').matches) setOpen(false);});
  </script>
</body>
</html>
