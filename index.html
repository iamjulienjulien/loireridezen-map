<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>✨ Loire Ride Zen – Carte de voyage à vélo 🚲</title>
    <meta
      name="description"
      content="Découvrez la carte interactive de Loire Ride Zen 🚴‍♂️ : étapes de ma rando à vélo, châteaux de la Loire et coups de cœur en chemin."
    />

    <!-- Runtime config (généré au build Vercel depuis les env vars, ou config.js local) -->
    <script src="config.js"></script>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.css"
    />
    <script type="importmap">
      {
        "imports": {
          "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js",
          "leaflet-extra-markers": "https://unpkg.com/leaflet-extra-markers@2.0.1/src/index.js"
        }
      }
    </script>

    <link rel="stylesheet" href="style.css" />

    <!-- Privacy-friendly analytics by Plausible -->
    <script
      defer
      src="https://plausible.io/js/pa-BOQLtEKyALECqC2DirH6B.js"
    ></script>
    <script>
      ((window.plausible =
        window.plausible ||
        function () {
          (plausible.q = plausible.q || []).push(arguments);
        }),
        (plausible.init =
          plausible.init ||
          function (i) {
            plausible.o = i || {};
          }));
      plausible.init();
    </script>
  </head>
  <body>
    <!-- Panneau de filtres + légende (rempli par app.js depuis POI_TYPES) -->
    <aside
      id="filtersPanel"
      class="controls"
      role="region"
      aria-label="Filtres et légende"
    >
      <div class="filters-header">
        <img
          src="/assets/logo_loire_ride_zen.jpg"
          class="logo"
          alt="Logo Loire Ride Zen"
        />
      </div>

      <section class="filters-section">
        <h2 class="section-title">Filtres</h2>
        <div id="filtersGrid" class="filters-grid"></div>
      </section>

      <hr />

      <section class="legend-section">
        <h2 class="section-title">Légende</h2>
        <div id="legendGrid" class="legend-grid"></div>
      </section>
    </aside>

    <button
      id="toggleFilters"
      class="filters-toggle"
      aria-expanded="false"
      aria-controls="filtersPanel"
    >
      Filtres
    </button>

    <div id="map"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
