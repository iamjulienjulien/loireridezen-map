<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loire Ride Zen – Carte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>html,body,#map{height:100%;margin:0;}</style>
</head>
<body>
<div id="map"></div>
<script>
const map = L.map('map').setView([47.455, -0.57], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

fetch('data/route.geojson').then(r=>r.json()).then(g=>{
  L.geoJSON(g, {style:{color:'#2E86AB',weight:4}}).addTo(map);
});

fetch('data/pois.geojson').then(r=>r.json()).then(g=>{
  L.geoJSON(g, {onEachFeature:(f,l)=>{
    let p=f.properties||{};
    l.bindPopup(`<b>${p.name}</b><br>${p.desc||''}`);
  }}).addTo(map);
});
</script>
</body>
</html>
