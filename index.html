<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loire Ride Zen – Carte (ExtraMarkers + Fullscreen)</title>

  <!-- Leaflet core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- ExtraMarkers + Font Awesome -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-extra-markers@1.2.1/dist/css/leaflet.extra-markers.min.css">
  <script src="https://unpkg.com/leaflet-extra-markers@1.2.1/dist/js/leaflet.extra-markers.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Fullscreen (CDN jsDelivr pour éviter l’erreur MIME) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@1.6.0/Control.FullScreen.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@1.6.0/Control.FullScreen.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; }

    .controls {
      position: absolute; z-index: 1000; top: 10px;
      background: white; padding: .6rem .8rem; border-radius: .5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); font-family: system-ui, sans-serif;
      transition: transform .25s ease;
      max-width: 320px;
    }

    /* Bouton pour afficher/masquer sur mobile */
    #toggleFilters {
      position: absolute; z-index: 1100; top: 10px; left: 10px;
      background: #fff; border: 1px solid #ddd; border-radius: .5rem;
      padding: .4rem .6rem; font-family: system-ui, sans-serif; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    #toggleFilters[aria-expanded="true"] { background:#f5f5f5; }

    .controls hr { margin: .5rem 0; }
    .poi-popup img { max-width: 240px; display: block; border-radius: 8px; margin-bottom: .35rem; }

    /* Desktop : panneau fixe à gauche */
    @media (min-width: 900px) {
      #toggleFilters { display: none; }
      .controls { left: 60px; top: 10px; }
    }

    /* Mobile : volet coulissant */
    @media (max-width: 899px) {
      .controls {
        left: 0; top: 0; right: auto;
        width: min(90vw, 420px);
        max-width: 90vw;
        height: 100%;
        overflow:auto;
        transform: translateX(-100%);
        box-shadow: 0 0 0 rgba(0,0,0,0);
        border-right: 1px solid #eee;
      }
      .controls.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.15); }
    }
  </style>
</head>
<body>

  <!-- Panneau filtres + légende -->
  <div id="filtersPanel" class="controls" role="region" aria-label="Filtres carte">
    <strong>Filtres :</strong>
    <div style="display:grid;grid-template-columns: 1fr 1fr; gap:.25rem .75rem; margin-top:.35rem;">
      <label><input type="checkbox" class="type-filter" value="paysage" checked> Paysage</label>
      <label><input type="checkbox" class="type-filter" value="patrimoine" checked> Patrimoine</label>
      <label><input type="checkbox" class="type-filter" value="guinguette" checked> Guinguette</label>
      <label><input type="checkbox" class="type-filter" value="hébergement" checked> Hébergement</label>
      <label><input type="checkbox" class="type-filter" value="départ" checked> Départ</label>
      <label><input type="checkbox" class="type-filter" value="arrivée" checked> Arrivée</label>
    </div>

    <hr>

    <div class="legend-in-controls" aria-label="Légende">
      <div style="font-weight:600; margin-bottom:.25rem;">Légende</div>
      <div class="legend-row" style="display:grid;grid-template-columns: auto 1fr;grid-row-gap:.3rem;grid-column-gap:.5rem;align-items:center;">
        <!-- Traces -->
        <div title="Trace principale" style="width:16px;height:4px;background:#2E86AB;border-radius:2px;"></div>
        <div>Trace principale</div>
        <div title="Variante / détour" style="width:16px;height:4px;background:#8E44AD;border-radius:2px;"></div>
        <div>Variante / détour</div>
        <!-- Pins (couleurs ExtraMarkers) -->
        <div style="width:16px;height:16px;border-radius:50%;background:#3498db;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-landmark" style="font-size:10px;color:#fff;"></i>
        </div>
        <div>Patrimoine</div>
        <div style="width:16px;height:16px;border-radius:4px;background:#2ecc71;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-flag-checkered" style="font-size:10px;color:#fff;"></i>
        </div>
        <div>Départ</div>
        <div style="width:16px;height:16px;border-radius:4px;background:#e74c3c;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-bullseye" style="font-size:10px;color:#fff;"></i>
        </div>
        <div>Arrivée</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#f39c12;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-music" style="font-size:10px;color:#fff;"></i>
        </div>
        <div>Guinguette</div>
        <div style="width:16px;height:16px;border-radius:50%;background:#9b59b6;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid fa-campground" style="font-size:10px;color:#fff;"></i>
        </div>
        <div>Hébergement</div>
      </div>
    </div>
  </div>

  <!-- Bouton d’ouverture du panneau (mobile) -->
  <button id="toggleFilters" aria-expanded="false" aria-controls="filtersPanel">Filtres</button>

  <!-- Carte -->
  <div id="map" role="application" aria-label="Carte Loire Ride Zen"></div>

  <script>
    // 1) Carte
    const map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([47.3, 0.5], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Fullscreen (classe correcte : L.Control.FullScreen)
    map.addControl(new L.Control.FullScreen({ position: 'topright', title: 'Plein écran' }));

    // 2) Couches
    const routeLayer = L.geoJSON(null, {
      style: f => ({
        color: f.properties && f.properties.variant ? '#8E44AD' : '#2E86AB',
        weight: 4, opacity: 0.9
      })
    });

    // Clustering plus doux
    const cluster = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 36
    });

    L.control.layers(
      { "OpenStreetMap": map._layers[Object.keys(map._layers)[0]]?.options?.attribution ? null : null }, // (juste le contrôle pour basculer Trace/POI)
      { "Trace": routeLayer, "Points d’intérêt": cluster },
      { collapsed: true }
    ).addTo(map);

    // 3) Icônes ExtraMarkers par type
    const iconByType = (type) => {
      switch (type) {
        case 'patrimoine':
          return L.ExtraMarkers.icon({ icon: 'landmark', prefix: 'fa', markerColor: 'blue', shape: 'penta', svg: true });
        case 'départ':
          return L.ExtraMarkers.icon({ icon: 'flag-checkered', prefix: 'fa', markerColor: 'green', shape: 'square', svg: true });
        case 'arrivée':
          return L.ExtraMarkers.icon({ icon: 'bullseye', prefix: 'fa', markerColor: 'red', shape: 'square', svg: true });
        case 'guinguette':
          return L.ExtraMarkers.icon({ icon: 'music', prefix: 'fa', markerColor: 'orange', shape: 'circle', svg: true });
        case 'hébergement':
          return L.ExtraMarkers.icon({ icon: 'campground', prefix: 'fa', markerColor: 'purple', shape: 'circle', svg: true });
        default:
          return L.ExtraMarkers.icon({ icon: 'map-pin', prefix: 'fa', markerColor: 'cyan', shape: 'circle', svg: true });
      }
    };

    // 4) Trace (utilise la version simplifiée si dispo)
    const routeUrl = 'data/route_simplified.geojson'; // sinon: 'data/route.geojson'
    fetch(routeUrl)
      .then(r => r.ok ? r.json() : fetch('data/route.geojson').then(rr=>rr.json()))
      .then(geojson => {
        routeLayer.addData(geojson).addTo(map);
        try {
          map.fitBounds(routeLayer.getBounds(), { padding: [30, 30], maxZoom: 13 });
        } catch(e) {}
      });

    // 5) POI + filtres
    let poiFeatures = [];
    function renderPOI() {
      cluster.clearLayers();
      const activeTypes = Array.from(document.querySelectorAll('.type-filter:checked')).map(i => i.value);
      const filtered = poiFeatures.filter(f => activeTypes.includes((f.properties||{}).type));

      const layer = L.geoJSON({ type: 'FeatureCollection', features: filtered }, {
        pointToLayer: (feature, latlng) => {
          const p = feature.properties || {};
          return L.marker(latlng, { icon: iconByType(p.type) });
        },
        onEachFeature: (feature, layer) => {
          const p = feature.properties || {};
          const imgHtml = p.image ? `<img src="${p.image}" alt="${p.name}" class="poi-img">` : '';
          const linkHtml = p.url ? `<p><a href="${p.url}" target="_blank" rel="noopener">En savoir plus ↗</a></p>` : '';
          layer.bindPopup(`
            <div class="poi-popup">
              ${imgHtml}
              <strong>${p.name || 'Point d’intérêt'}</strong><br/>
              <small>Type : ${p.type || '—'}${p.stage ? ` · Étape ${p.stage}` : ''}</small>
              <p>${p.desc ?? ''}</p>
              ${linkHtml}
            </div>
          `);
        }
      });

      cluster.addLayer(layer);
      map.addLayer(cluster);
    }

    fetch('data/pois.geojson')
      .then(r => r.json())
      .then(geojson => {
        poiFeatures = geojson.features || [];
        renderPOI();
      });

    document.querySelectorAll('.type-filter').forEach(cb => cb.addEventListener('change', renderPOI));

    // 6) Drawer mobile
    const toggleBtn = document.getElementById('toggleFilters');
    const panel = document.getElementById('filtersPanel');
    function setOpen(open){
      if(open){ panel.classList.add('open'); toggleBtn.setAttribute('aria-expanded','true'); }
      else { panel.classList.remove('open'); toggleBtn.setAttribute('aria-expanded','false'); }
    }
    toggleBtn.addEventListener('click', () => { setOpen(!panel.classList.contains('open')); });
    map.on('click', () => { if (window.matchMedia('(max-width: 899px)').matches) setOpen(false); });
  </script>
</body>
</html>
