<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>✨ Loire Ride Zen – Carte de voyage à vélo 🚲</title>
    <meta
      name="description"
      content="Découvrez la carte interactive de Loire Ride Zen 🚴‍♂️ : étapes de ma rando à vélo, châteaux de la Loire et coups de cœur en chemin."
    />

    <!-- Runtime config (généré au build Vercel depuis les env vars, ou config.js local) -->
    <script src="config.js"></script>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.css"
    />
    <script type="importmap">
      {
        "imports": {
          "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js",
          "leaflet-extra-markers": "https://unpkg.com/leaflet-extra-markers@2.0.1/src/index.js"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="style.css" />

    <!-- Privacy-friendly analytics by Plausible -->
    <script
      defer
      src="https://plausible.io/js/pa-BOQLtEKyALECqC2DirH6B.js"
    ></script>
    <script>
      ((window.plausible =
        window.plausible ||
        function () {
          (plausible.q = plausible.q || []).push(arguments);
        }),
        (plausible.init =
          plausible.init ||
          function (i) {
            plausible.o = i || {};
          }));
      plausible.init();
    </script>
  </head>
  <body>
    <!-- Skeleton de chargement plein écran -->
    <div id="lrz-loading" class="lrz-loading">
      <div class="lrz-loading__inner">
        <img src="assets/logo_loire_ride_zen.jpg" alt="Chargement…" />
        <p>Chargement de la carte…</p>
      </div>
    </div>

    <!-- Panel cockpit -->
    <aside
      id="filtersPanel"
      class="lrz-panel"
      role="region"
      aria-label="Filtres et légende"
    >
      <!-- En-tête avec logo rond -->
      <header class="lrz-panel__header">
        <img
          class="lrz-panel__logo"
          src="assets/logo_loire_ride_zen.jpg"
          alt="Loire Ride Zen"
        />
        <div class="lrz-panel__heading">
          <h1>Loire Ride Zen</h1>
          <p>Carte interactive</p>
        </div>
      </header>

      <!-- Ligne 1 : zoom + map toggle -->
      <div class="lrz-action-row lrz-action-row--primary">
        <div class="lrz-btn-group">
          <button class="lrz-btn lrz-btn--zoom" data-action="zoom-in" title="Zoom avant" aria-label="Zoom avant">+</button>
          <button class="lrz-btn lrz-btn--zoom" data-action="zoom-out" title="Zoom arrière" aria-label="Zoom arrière">−</button>
        </div>
        <button class="lrz-btn lrz-btn--map-toggle" data-action="toggle-map" title="Changer le fond de carte" aria-label="Basculer Plan / Satellite">
          <span id="map-toggle-label">🗺️ Plan</span>
        </button>
      </div>

      <!-- Ligne 2 : reset · goto-julien · locate-me -->
      <div class="lrz-action-row lrz-action-row--secondary">
        <button class="lrz-btn lrz-btn--action" data-action="reset-view" title="Recentrer sur les traces" aria-label="Recentrer">🧭</button>
        <button class="lrz-btn lrz-btn--action lrz-btn--disabled" data-action="goto-julien" title="Pas de position active" aria-label="Aller à la position de Julien" id="btn-goto-julien" disabled>🚲</button>
        <button class="lrz-btn lrz-btn--action" data-action="locate-me" title="Ma position" aria-label="Ma position">📍</button>
      </div>

      <!-- Section Traces -->
      <section class="lrz-section lrz-panel-section--actes" data-section="traces">
        <header class="lrz-section__header">
          <h3>Traces <span class="lrz-section__count" id="traces-count"></span></h3>
          <button class="lrz-section__all" data-target="traces">Tout</button>
          <button class="lrz-section__toggle" aria-expanded="true">▾</button>
        </header>
        <div class="lrz-section__body" id="traces-list">
          <!-- rempli par app.js depuis groups.json -->
        </div>
        <div class="lrz-section__footer">
          <a
            class="lrz-link-btn lrz-link-btn--komoot"
            href="https://www.komoot.com/user/1484664526803"
            target="_blank"
            rel="noopener noreferrer"
          >🚲 Voir sur Komoot</a>
        </div>
      </section>

      <!-- Section Points d'intérêt -->
      <section class="lrz-section lrz-panel-section--poi" data-section="poi">
        <header class="lrz-section__header">
          <h3>Points d'intérêt <span class="lrz-section__count" id="poi-count"></span> <span class="lrz-section__badge" id="poi-visible"></span></h3>
          <button class="lrz-section__all" data-target="poi">Tout</button>
          <button class="lrz-section__toggle" aria-expanded="true">▾</button>
        </header>
        <div class="lrz-section__body" id="poi-list">
          <!-- rempli par app.js depuis POI_TYPES -->
        </div>
      </section>

      <!-- Section Photos -->
      <section class="lrz-section lrz-panel-section--photos" data-section="photos">
        <header class="lrz-section__header">
          <h3>Photos</h3>
          <button class="lrz-section__toggle" aria-expanded="true">▾</button>
        </header>
        <div class="lrz-section__body" id="photos-list">
          <!-- rempli par app.js -->
        </div>
        <div class="lrz-section__footer">
          <a
            class="lrz-link-btn lrz-link-btn--instagram"
            href="https://www.instagram.com/loireridezen"
            target="_blank"
            rel="noopener noreferrer"
          >📷 Suivre @loireridezen</a>
        </div>
      </section>

      <!-- Section Options -->
      <section class="lrz-section lrz-panel-section--options" data-section="options">
        <header class="lrz-section__header">
          <h3>Options</h3>
          <button class="lrz-section__toggle" aria-expanded="true">▾</button>
        </header>
        <div class="lrz-section__body">
          <div class="lrz-row">
            <div class="lrz-row__visual lrz-row__visual--emoji">🚲</div>
            <label class="lrz-row__label" for="position-toggle">Afficher ma position</label>
            <input type="checkbox" class="lrz-checkbox" id="position-toggle" />
          </div>
          <div class="lrz-panel__actions">
            <button class="lrz-reset-btn" id="reset-prefs">Réinitialiser les filtres</button>
          </div>
        </div>
      </section>
    </aside>

    <!-- Bouton d'ouverture du drawer mobile -->
    <button
      id="toggleFilters"
      class="filters-toggle"
      aria-expanded="false"
      aria-controls="filtersPanel"
    >
      Filtres
    </button>

    <!-- Signature en bas à droite -->
    <div class="lrz-signature">
      <strong>Bonne route 🚲</strong>
      <span>Une création de <a href="https://julienjulien.fr" target="_blank" rel="noopener">Julien Julien</a></span>
    </div>

    <div id="map"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
